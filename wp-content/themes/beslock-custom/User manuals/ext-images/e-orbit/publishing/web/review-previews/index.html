<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Review Drafts</title>
  <style>
    :root {
      --bg: #efe4cf;
      --ink: #1a2430;
      --muted: #5f6870;
      --card: rgba(255, 252, 245, 0.78);
      --accent: #8c3d16;
      --border: rgba(140, 61, 22, 0.16);
      --shadow: rgba(26, 36, 48, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(140, 61, 22, 0.10), transparent 30%),
        linear-gradient(180deg, #f7efe1 0%, var(--bg) 100%);
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 42px 20px 60px;
    }
    .hero {
      margin-bottom: 28px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: 0 20px 44px var(--shadow);
    }
    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      color: var(--accent);
      line-height: 1.08;
    }
    .hero p {
      max-width: 760px;
      font-size: 1.08rem;
      line-height: 1.75;
      color: var(--muted);
      margin: 14px 0 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }
    .card {
      display: block;
      padding: 22px;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 18px 32px var(--shadow);
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 40px rgba(26, 36, 48, 0.16);
      border-color: rgba(140, 61, 22, 0.28);
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .card h2 {
      margin: 0;
      font-size: 1.6rem;
      line-height: 1.18;
    }
    .card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Manual Review Drafts</h1>
      <p>Paquete de revision del reset visual 2026-05-13: manuales con assets schematicos o hibridos, sin figuras humanas completas y listos para validacion antes de publicacion.</p>
    </section>
    <section class="grid">
      <a class="card" href="e-orbit-user-manual-review-draft.html">
          <span class="eyebrow">Review draft</span>
          <h2>e-Orbit</h2>
          <p>e-Orbit user manual - review-draft.md</p>
        </a>
    </section>
  </main>
</body>
</html>
